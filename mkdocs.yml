site_name: ChronoAPI - Historial y Planes
site_description: Documentación oficial, planes de desarrollo e historial completo de conversaciones de ChronoAPI.

theme:
  name: material
  language: es
  palette:
    # Esquema Oscuro (Predeterminado - Combina con el diseño glassmorphism de ChronoAPI)
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: light blue
      toggle:
        icon: material/weather-sunny
        name: Cambiar a modo claro
    # Esquema Claro
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: light blue
      toggle:
        icon: material/weather-night
        name: Cambiar a modo oscuro
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - def_list
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - tables


nav:
